trigger:
  branches:
    include: [main]

pr:
  branches:
    include: [main]

variables:
  - group: snapdetective-secrets
  - name: ACR_NAME
    value: snapdetectiveacr
  - name: IMAGE_NAME
    value: snapdetective-images
  - name: CONTAINER_APP_NAME
    value: images-service
  - name: RESOURCE_GROUP
    value: SnapDetective

stages:
  - stage: BuildAndPush
    displayName: Build & Push to ACR
    jobs:
      - job: Build
        pool:
          vmImage: ubuntu-latest
        steps:
          - checkout: self

          - task: Docker@2
            displayName: Build & push
            inputs:
              containerRegistry: 'snapdetective-acr'
              repository: $(IMAGE_NAME)
              command: buildAndPush
              Dockerfile: Dockerfile.txt
              buildContext: .
              tags: |
                $(Build.SourceVersion)
                latest
              arguments: --build-arg AZURE_ARTIFACTS_PAT=$(AZURE_ARTIFACTS_PAT)

  - stage: Deploy
    displayName: Deploy to Container Apps
    dependsOn: BuildAndPush
    condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
    jobs:
      - job: Deploy
        pool:
          vmImage: ubuntu-latest
        steps:
          - task: AzureContainerApps@1
            displayName: Deploy to Container App
            inputs:
              azureSubscription: 'snapdetective-subscription'
              containerAppName: $(CONTAINER_APP_NAME)
              resourceGroup: $(RESOURCE_GROUP)
              imageToDeploy: $(ACR_NAME).azurecr.io/$(IMAGE_NAME):$(Build.SourceVersion)
              environmentVariables: >
                ConnectionStrings__DefaultConnection=$(ConnectionStrings__DefaultConnection)
                ConnectionStrings__BlobStorage=$(ConnectionStrings__BlobStorage)